
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aetherium SPI Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --violet-glow: 0 0 5px rgba(167, 139, 250, 0.6), 0 0 10px rgba(167, 139, 250, 0.4), 0 0 15px rgba(167, 139, 250, 0.2);
        --cyan-glow: 0 0 5px rgba(0, 199, 255, 0.5), 0 0 10px rgba(0, 199, 255, 0.3), 0 0 15px rgba(0, 199, 255, 0.2);
      }
      body {
        font-family: 'Roboto Mono', monospace;
        background-color: #010413;
        color: #e0e0e0;
        overflow: hidden; /* Prevent scrolling of the main page */
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(13, 22, 64, 0.5);
      }
      ::-webkit-scrollbar-thumb {
        background-color: rgba(139, 92, 246, 0.6);
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background-color: rgba(139, 92, 246, 0.9);
      }
      .violet-glow {
        box-shadow: var(--violet-glow);
      }
      .cyan-glow {
        box-shadow: var(--cyan-glow);
      }
      .aura-avatar {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: radial-gradient(ellipse at center, rgba(196, 181, 253, 0.8) 0%, rgba(109, 40, 217, 0.7) 40%, rgba(55, 48, 163, 0.5) 80%, transparent 100%);
        box-shadow: var(--violet-glow), inset 0 0 10px rgba(233, 213, 255, 0.5);
        animation: pulse-aura 4s ease-in-out infinite, rotate-aura 20s linear infinite;
        position: relative;
      }
      .aura-avatar::before, .aura-avatar::after {
        content: '';
        position: absolute;
        border-radius: 50%;
        animation: rotate-aura-reverse 15s linear infinite;
      }
      .aura-avatar::before {
        inset: 4px;
        border: 1px dashed rgba(221, 214, 254, 0.5);
      }
       .aura-avatar::after {
        inset: -5px;
        border: 1px solid rgba(139, 92, 246, 0.3);
      }
      @keyframes pulse-aura {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        50% { transform: scale(1.05); opacity: 1; }
      }
       @keyframes rotate-aura {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes rotate-aura-reverse {
        from { transform: rotate(0deg); }
        to { transform: rotate(-360deg); }
      }
    </style>
  <script type="importmap">

  }
}
</script>
